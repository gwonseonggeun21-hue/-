<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 홍보 블로그 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .blog-preview { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">🚀 AI 홍보 블로그 생성기</h1>
            <p class="text-gray-600">이미지와 핵심 키워드만 입력하면 멋진 블로그 포스팅이 완성됩니다.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left: Input Section -->
            <section class="space-y-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. 홍보 이미지 업로드</label>
                    <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-blue-400 transition-colors cursor-pointer">
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                        <p id="upload-text" class="text-gray-500 text-sm">클릭하거나 이미지를 드래그하세요</p>
                        <img id="image-preview" class="mt-4 hidden max-h-48 mx-auto rounded shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">2. 핵심 내용 및 소스 (텍스트)</label>
                    <textarea id="source-text" rows="8" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm" placeholder="상품명, 장점, 이벤트 내용 등 홍보하고 싶은 핵심 내용을 입력하세요."></textarea>
                </div>

                <button id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95 shadow-md">
                    포스팅 생성하기 ✨
                </button>
            </section>

            <!-- Right: Output Section -->
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800">미리보기 및 결과</h2>
                    <button id="copy-btn" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded border border-gray-300 transition-colors">
                        전체 복사하기
                    </button>
                </div>

                <div id="output-area" class="blog-preview p-6 min-h-[500px] border border-gray-200 overflow-y-auto">
                    <div id="placeholder-content" class="text-gray-400 text-center mt-20">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 2v4a2 2 0 002 2h4"></path>
                        </svg>
                        <p>왼쪽 정보를 입력하고 생성을 눌러주세요.</p>
                    </div>
                    <article id="generated-article" class="hidden space-y-4">
                        <h2 id="res-title" class="text-2xl font-extrabold text-gray-900 border-b pb-2"></h2>
                        <div id="res-image-container" class="my-4"></div>
                        <p id="res-intro" class="text-gray-700 leading-relaxed font-medium italic"></p>
                        <div id="res-body" class="text-gray-800 leading-7 space-y-4 whitespace-pre-line"></div>
                        <div id="res-tags" class="text-blue-500 font-medium pt-4"></div>
                    </article>
                </div>
            </section>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2 rounded-full text-sm opacity-0 transition-opacity pointer-events-none">
        복사되었습니다!
    </div>

    <script>
        const imageInput = document.getElementById('image-input');
        const dropZone = document.getElementById('drop-zone');
        const imagePreview = document.getElementById('image-preview');
        const uploadText = document.getElementById('upload-text');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const outputArea = document.getElementById('output-area');
        const placeholderContent = document.getElementById('placeholder-content');
        const generatedArticle = document.getElementById('generated-article');
        const toast = document.getElementById('toast');

        // Image Handling
        dropZone.onclick = () => imageInput.click();
        
        imageInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    imagePreview.classList.remove('hidden');
                    uploadText.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // Pseudo AI Generation Logic
        generateBtn.onclick = function() {
            const text = document.getElementById('source-text').value;
            if (!text) {
                showToast("내용을 입력해주세요!");
                return;
            }

            generateBtn.innerText = "생성 중...";
            generateBtn.disabled = true;

            // Simulate AI Processing delay
            setTimeout(() => {
                const title = `[추천] ${text.split('\n')[0].substring(0, 20)}... 직접 써본 후기 및 정보 공유`;
                const intro = `안녕하세요! 오늘은 많은 분들이 궁금해하시는 "${text.split('\n')[0].substring(0, 15)}"에 대해 자세히 알아보려고 합니다. 실생활에서 정말 유용한 꿀팁들 위주로 정리했으니 끝까지 읽어주세요!`;
                
                const body = `최근 트렌드에서 빠질 수 없는 핵심은 바로 '효율성'이죠. \n\n${text}\n\n위 내용처럼 확실한 장점이 돋보이는 구성입니다. 제가 직접 살펴보니 디자인부터 성능까지 어느 하나 빠지는 게 없더라고요. 특히 사용자들의 만족도가 높은 이유를 알 것 같습니다.`;
                
                const tags = `#홍보 #리뷰 #일상 #추천 #${text.split(' ')[0]} #AI블로그`;

                // Render
                document.getElementById('res-title').innerText = title;
                document.getElementById('res-intro').innerText = intro;
                document.getElementById('res-body').innerText = body;
                document.getElementById('res-tags').innerText = tags;

                const imgContainer = document.getElementById('res-image-container');
                imgContainer.innerHTML = '';
                if (!imagePreview.classList.contains('hidden')) {
                    const clonedImg = imagePreview.cloneNode();
                    clonedImg.className = "w-full rounded-lg shadow-md";
                    imgContainer.appendChild(clonedImg);
                }

                placeholderContent.classList.add('hidden');
                generatedArticle.classList.remove('hidden');
                
                generateBtn.innerText = "포스팅 생성하기 ✨";
                generateBtn.disabled = false;
                showToast("포스팅이 생성되었습니다!");
            }, 1000);
        };

        // Copy to clipboard
        copyBtn.onclick = function() {
            const content = outputArea.innerText;
            const el = document.createElement('textarea');
            el.value = content;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("클립보드에 복사되었습니다!");
        };

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 2000);
        }
    </script>
</body>
</html>
